<body>

<div class="game">
    <p id = "name">Rock Paper Scissor</p>
 <div class="container">

        <button class="box" id="scissor">✌🏻️</button>
 </div>
  <div class="score-board">
     <div class="score">

        <text>you</text>
     </div>
     <div class="score">
        <p id="comp-score">0</p>
        <text>comp</text>
     </div>
  </div>
</div>

    <p id="msg">play your move</p>
</div>
